services:
  - type: web
    name: http-analyzer-api
    runtime: node
    plan: free
    buildCommand: npm ci && npx playwright install chromium chromium-headless-shell
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DISABLE_CAPTURE
        value: "false"
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: CAPTURE_READY_DELAY_MS
        value: "3000"
      - key: CAPTURE_IDLE_AUTO_STOP_MS
        value: "10000"
      - key: CAPTURE_CRAWL_ENABLED
        value: "true"
      - key: CAPTURE_CRAWL_MAX_PAGES
        value: "8"
      - key: CAPTURE_CRAWL_PAGE_DELAY_MS
        value: "1500"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
