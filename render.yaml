services:
  - type: web
    name: http-analyzer-api
    runtime: node
    plan: free
    buildCommand: npm ci && npx playwright install chromium chromium-headless-shell
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DISABLE_CAPTURE
        value: "false"
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: CAPTURE_READY_DELAY_MS
        value: "3000"
      - key: CAPTURE_IDLE_AUTO_STOP_MS
        value: "10000"
      - key: CAPTURE_CRAWL_ENABLED
        value: "true"
      - key: CAPTURE_CRAWL_MAX_PAGES
        value: "8"
      - key: CAPTURE_CRAWL_PAGE_DELAY_MS
        value: "1500"
      - key: CAPTURE_LOGIN_WAIT_MS
        value: "3000"
      - key: RECENT_CAPTURE_EVENTS_LIMIT
        value: "100"
      - key: RECENT_INSPECTION_RUNS_LIMIT
        value: "100"
      - key: DISABLE_SQLMAP
        value: "true"
      - key: OPENAI_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: CLOUDFLARE_R2_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_R2_ACCESS_KEY_ID
        sync: false
      - key: CLOUDFLARE_R2_SECRET_ACCESS_KEY
        sync: false
      - key: CLOUDFLARE_R2_BUCKET
        sync: false
      - key: CLOUDFLARE_R2_PUBLIC_BASE_URL
        sync: false
